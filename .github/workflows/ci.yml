name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      # go.mod declares `go 1.25.0` and transitive deps (modernc.org/sqlite
      # → modernc.org/cc, golang.org/x/tools) require Go 1.23+. Older matrix
      # entries fail at `go mod download`. Keep the matrix aligned with the
      # minimum the module declares.
      matrix:
        go: ["1.25"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Race detector
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # `latest` resolved to v1.64.8 (built with Go 1.24) which refuses
          # to load a go.mod targeting Go 1.25. Pin to a version built with
          # Go 1.25 or later. Bump when the tool ships newer major versions.
          version: v1.65.0
          args: --timeout=5m

  goreleaser-check:
    name: GoReleaser check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check
