version: "2"

# Minimal config — use golangci-lint v2 defaults, with targeted errcheck
# exclusions for idioms that are routinely safe to ignore in this codebase.
# See docs/confidence.md et al. for the product; this file is only about lint.

linters:
  settings:
    errcheck:
      # Functions whose error returns are not actionable in this codebase.
      # Most of these are either:
      #   (a) writes into a strings.Builder that cannot fail
      #   (b) idiomatic deferred Close() on sql.Rows / sql.DB / *os.File
      #   (c) test-scaffolding helpers whose failure would surface via a
      #       subsequent assertion anyway
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*github.com/karthikarunapuram8-dot/pathcollapse/pkg/graph.Graph).AddEdge
        - (*github.com/karthikarunapuram8-dot/pathcollapse/pkg/graph.Graph).AddNode
        # Deferred close on our own snapshot store — same pattern as sql.DB.
        - (*github.com/karthikarunapuram8-dot/pathcollapse/pkg/snapshot.Store).Close
        # Cobra's MarkFlagRequired only errors on unknown flag names, which
        # the caller controls statically. Real misuse surfaces at startup.
        - (*github.com/spf13/cobra.Command).MarkFlagRequired

  exclusions:
    # Don't treat the advisory-report ExecutiveSummary fmt.Fprintf calls as
    # findings — they write to io.Writer which is the caller's responsibility
    # to error-check.
    rules:
      - path: _test\.go
        linters:
          - errcheck
